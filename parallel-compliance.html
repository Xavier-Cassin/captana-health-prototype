    // =====================================================================
    // HELPERS
    // =====================================================================
    function h(tag, attrs, ...children) {
      const el = document.createElement(tag);
      if (attrs) Object.entries(attrs).forEach(([k,v]) => {
        if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
        else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
        else if (k === 'className') el.className = v;
        else if (k === 'innerHTML') el.innerHTML = v;
        else el.setAttribute(k, v);
      });
      children.flat(Infinity).forEach(c => {
        if (c == null) return;
        el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      });
      return el;
    }

    function delta(val, invert) {
      if (val === 0) return '<span style="color:#677b82;font-size:12px">&#8594; 0</span>';
      const pos = val > 0;
      const good = invert ? !pos : pos;
      const col = good ? '#12b76a' : '#f04438';
      const arr = pos ? '&#9650;' : '&#9660;';
      return `<span style="color:${col};font-size:12px;font-weight:500">${arr} ${Math.abs(val)}</span>`;
    }

    function fmtNum(v) {
      if (typeof v === 'number' && v % 1 !== 0) return v.toLocaleString('en',{minimumFractionDigits:1,maximumFractionDigits:1});
      return v.toLocaleString('en');
    }

    function scaleVal(v) { return Math.round(v * multiplier()); }

    // =====================================================================
    function updateStoreDropdown() {
      const sel = document.getElementById('store-select');
      sel.innerHTML = '<option value="all">All Stores</option>';
      if (selectedChain === 'all') {
        Object.values(CHAINS).forEach(chain => {
          chain.stores.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });
        });
      } else {
        CHAINS[selectedChain].stores.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });
      }
      sel.value = selectedStore;
      if (!sel.querySelector(`option[value="${selectedStore}"]`)) { selectedStore = 'all'; sel.value = 'all'; }
    }

    function updateScopeBanner() {
      const banner = document.getElementById('scope-banner');
      const count = getStoreCount();
      const isAgg = count > 1;
      if (isAgg) {
        banner.className = 'flex items-center gap-3 bg-white border-b px-6 py-2';
        banner.style.borderColor = '#e3eaed';
        const chainLabel = selectedChain === 'all' ? 'All Chains' : CHAINS[selectedChain].label;

        `;
      } else {
        banner.className = 'hidden';
        banner.innerHTML = '';
      }
    }

      selectedChain = e.target.value;
      selectedStore = 'all';
      updateStoreDropdown();
      updateScopeBanner();
      render();

    // =====================================================================
    // SVG CHART
    // =====================================================================
    function buildChart(data, color) {
      const mult = multiplier();
      const scaled = data.map(v => Math.round(v * mult));
      const W = 900, H = 240, PX = 50, PY = 20;
      const min = Math.min(...scaled) - 2, max = Math.max(...scaled) + 2;
      const range = max - min || 1;
      const pts = scaled.map((v,i) => ({
        x: PX + i * ((W - PX * 2) / (scaled.length - 1)),
        y: PY + (1 - (v - min) / range) * (H - PY * 2),
      }));
      const linePath = pts.map((p,i) => `${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
      const areaPath = linePath + ` L${pts[pts.length-1].x},${H-PY} L${pts[0].x},${H-PY} Z`;

      const yTicks = 5;
      let gridLines = '', yLabels = '';
      for (let i = 0; i <= yTicks; i++) {
        const y = PY + i * ((H - PY * 2) / yTicks);
        const val = max - i * (range / yTicks);
        gridLines += `<line x1="${PX}" y1="${y}" x2="${W-PX}" y2="${y}" stroke="#e3eaed" stroke-dasharray="3 3"/>`;
        yLabels += `<text x="${PX-8}" y="${y+4}" text-anchor="end" fill="#677b82" font-size="11">${Math.round(val)}</text>`;
      }
      let xLabels = '';
      pts.forEach((p,i) => { xLabels += `<text x="${p.x}" y="${H-2}" text-anchor="middle" fill="#677b82" font-size="11">${DATES[i]}</text>`; });

      return `
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;max-height:280px">
          ${gridLines}${yLabels}${xLabels}
          <path d="${areaPath}" fill="${color}" fill-opacity="0.08"/>
          <path d="${linePath}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
          ${pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="4" fill="white" stroke="${color}" stroke-width="2"/>`).join('')}
        </svg>
      `;
    }

      const toggle = h('div', {className:'inline-flex rounded-lg p-0.5', style:{background:'#f1f7f9',border:'1px solid #e3eaed'}});
      ['out-of-shelf','assortment','planogram'].forEach(k => {
        const labels = {'out-of-shelf':'% Out-of-Shelf','assortment':'% Assortment Compliance','planogram':'% Planogram Compliance'};
        const btn = h('button', {
          className: `rounded-md px-4 py-2 text-xs font-medium transition ${k===active ? 'shadow-sm' : ''}`,
          style: k===active ? {background:'white',color:'#1c3036'} : {color:'#677b82'},
          onClick: () => { active = k; sortKey = 'c3'; sortDir = 'desc'; render(); }
        }, labels[k]);
        toggle.appendChild(btn);
      });
      header.appendChild(toggle);
      el.appendChild(header);

      // --- KPIs ---
      const kpiSection = h('div', {className:'flex flex-col gap-3'});
      kpiSection.appendChild(h('h2', {className:'text-sm font-semibold', style:{color:'#475e66'}}, 'KPIs'));
      const kpiRows = h('div', {className:'flex flex-col gap-3'});

      if (m.hasShelfStore) {
        // Out-of-Shelf: keep Shelf/Store split
        [['SHELF','#12b76a',m.kpis.shelf],['STORE','#f5702a',m.kpis.store]].forEach(([scope,bc,kpi]) => {
          const scaledC2 = scaleVal(kpi.c2Num);
          const scaledTot = scaleVal(kpi.c2Tot);
          const c2Display = isAgg ? `${fmtNum(scaledC2)} / ${fmtNum(scaledTot)}` : kpi.c2Val;
          const row = h('div', {className:'grid items-center gap-4', style:{gridTemplateColumns:'auto 1fr 1fr 1fr'}});
          row.innerHTML = `
            <span class="inline-flex items-center rounded-md px-2.5 py-1 font-bold uppercase tracking-wider text-white" style="background:${bc};font-size:10px;letter-spacing:0.06em">${scope}</span>
            <div class="rounded-2xl border p-4" style="border-color:#e3eaed;box-shadow:0 0 0 4px rgba(227,234,237,0.6)">
              <p class="mb-1 text-xs font-medium" style="color:#677b82">${kpi.rateLabel}</p>
              <p class="text-2xl font-bold" style="color:#1c3036">${(kpi.rate*100).toFixed(2)}%</p>
            </div>
            <div class="rounded-2xl border p-4" style="border-color:#e3eaed;box-shadow:0 0 0 4px rgba(227,234,237,0.6)">
              <p class="mb-1 text-xs font-medium" style="color:#677b82">${kpi.c2Label}</p>
              <div class="flex items-center gap-2">
                <span class="text-lg font-semibold" style="color:#1c3036">${c2Display}</span>
                ${delta(kpi.c2D, true)}
              </div>
            </div>
            <div class="rounded-2xl border p-4" style="border-color:#e3eaed;box-shadow:0 0 0 4px rgba(227,234,237,0.6)">
              <p class="mb-1 text-xs font-medium" style="color:#677b82">${kpi.c3Label}</p>
              <div class="flex items-center gap-2">
                <span class="text-lg font-semibold" style="color:#1c3036">${kpi.c3Val}</span>
                ${delta(kpi.c3D, true)}
              </div>
            </div>
          `;
          kpiRows.appendChild(row);
        });
      } else {
        // Assortment / Planogram: single row, no badge, 3 equal KPI cards
        const kpi = m.kpis.single;
        const scaledC2 = scaleVal(kpi.c2Num);
        const scaledTot = scaleVal(kpi.c2Tot);
        const scaledC3 = scaleVal(kpi.c3Num);
        const c2Display = isAgg ? `${fmtNum(scaledC2)} / ${fmtNum(scaledTot)}` : kpi.c2Val;
        const c3Display = isAgg ? fmtNum(scaledC3) : kpi.c3Val;
        const row = h('div', {className:'grid items-center gap-4', style:{gridTemplateColumns:'1fr 1fr 1fr'}});
        row.innerHTML = `
          <div class="rounded-2xl border p-4" style="border-color:#e3eaed;box-shadow:0 0 0 4px rgba(227,234,237,0.6)">
            <p class="mb-1 text-xs font-medium" style="color:#677b82">${kpi.rateLabel}</p>
            <p class="text-2xl font-bold" style="color:#1c3036">${(kpi.rate*100).toFixed(2)}%</p>
          </div>
          <div class="rounded-2xl border p-4" style="border-color:#e3eaed;box-shadow:0 0 0 4px rgba(227,234,237,0.6)">
            <p class="mb-1 text-xs font-medium" style="color:#677b82">${kpi.c2Label}</p>
            <div class="flex items-center gap-2">
              <span class="text-lg font-semibold" style="color:#1c3036">${c2Display}</span>
              ${delta(kpi.c2D, false)}
            </div>
          </div>
          <div class="rounded-2xl border p-4" style="border-color:#e3eaed;box-shadow:0 0 0 4px rgba(227,234,237,0.6)">
            <p class="mb-1 text-xs font-medium" style="color:#677b82">${kpi.c3Label}</p>
            <div class="flex items-center gap-2">
              <span class="text-lg font-semibold" style="color:#1c3036">${c3Display}</span>
              ${delta(kpi.c3D, false)}
            </div>
          </div>
        `;
        kpiRows.appendChild(row);
      }

      kpiSection.appendChild(kpiRows);
      el.appendChild(kpiSection);

      // --- Top categories ---
      const topSection = h('div', {className:'flex flex-col gap-3'});
      topSection.appendChild(h('h2', {className:'text-sm font-semibold', style:{color:'#475e66'}}, m.topTitle));
      const topRow = h('div', {className:'flex gap-3 overflow-x-auto pb-2 scrollbar-hide'});
      m.topCards.forEach(c => {
        const scaledIc = scaleVal(c.ic);
        const card = h('div', {className:'flex flex-col items-center gap-2 rounded-2xl border bg-white p-4 text-center shadow-sm', style:{borderColor:'#e3eaed',minWidth:'155px'}});
        card.innerHTML = `
          <div class="flex items-center justify-center rounded-xl" style="width:48px;height:48px;background:#f1f7f9">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#677b82" stroke-width="1.5" stroke-linecap="round"><path d="M3 5h18M3 10h18M3 15h18M3 20h18"/></svg>
          </div>
          <div>
            <p class="text-xs font-medium leading-tight" style="color:#3d5761;max-width:130px">${c.n}</p>
            <p style="font-size:10px;color:#9aaab0">${scaleVal(c.p)} products</p>
          </div>
          <p class="text-lg font-bold" style="color:${m.color}">${(c.r*100).toFixed(2)}%</p>
          <p style="font-size:10px;color:${m.color}">(${fmtNum(scaledIc)} ${c.il})</p>
          <button class="flex items-center gap-1 hover:opacity-80 transition" style="font-size:11px;font-weight:500;color:#677b82">
            <span>Learn more</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
          </button>
        `;
        topRow.appendChild(card);
      });
      topSection.appendChild(topRow);
      el.appendChild(topSection);

      // --- Trend chart ---
      const trendSection = h('div', {className:'flex flex-col gap-4'});
      trendSection.appendChild(h('h2', {className:'text-base font-semibold', style:{color:'#1c3036'}}, 'Trend (last 7 days)'));
      const trendControls = h('div', {className:'flex items-center justify-between flex-wrap gap-3'});
      trendControls.innerHTML = `
        <div class="flex items-center gap-2">
          <span class="text-xs font-medium" style="color:#677b82">Indicator</span>
          <select class="rounded-lg border px-3 py-1.5 text-sm outline-none" style="border-color:#e3eaed;color:#3d5761;min-width:200px">
            ${m.trendOpts.map(o => `<option value="${o.v}">${o.l}</option>`).join('')}
          </select>
        </div>
        <div class="flex items-center gap-3">
          <div class="flex items-center gap-1.5">
            <div class="rounded" style="width:20px;height:3px;background:${m.chartColor}"></div>
            <span class="text-xs" style="color:#677b82">Level 3</span>
          </div>
          <select class="rounded-lg border px-3 py-1.5 text-sm outline-none" style="border-color:#e3eaed;color:#3d5761;min-width:160px">
            <option>SOFTS DRINKS</option>
          </select>
        </div>
      `;
      trendSection.appendChild(trendControls);
      trendSection.appendChild(h('div', {innerHTML: buildChart(m.trend, m.chartColor)}));
      el.appendChild(trendSection);

      // --- Breakdown table ---
      const tblSection = h('div', {className:'flex flex-col gap-4'});
      tblSection.appendChild(h('h2', {className:'text-base font-semibold', style:{color:'#1c3036'}}, m.brkTitle));

      const sorted = [...m.brk].sort((a,b) => {
        let av = sortKey==='l'?a.l:sortKey==='r'?a.r:sortKey==='c2'?a.c2:a.c3;
        let bv = sortKey==='l'?b.l:sortKey==='r'?b.r:sortKey==='c2'?b.c2:b.c3;
        if (av<bv) return sortDir==='asc'?-1:1;
        if (av>bv) return sortDir==='asc'?1:-1;
        return 0;
      });

      const sortIcon = `<svg style="display:inline;vertical-align:middle;margin-left:4px" width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="#9aaab0" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>`;
      const colKeys = ['l','r','c2','c3'];
      const showShelfGroup = m.hasShelfStore;
      const tblWrap = h('div', {className:'overflow-hidden rounded-xl border bg-white', style:{borderColor:'#e3eaed'}});
      let tblHTML = `<table style="width:100%;text-align:left;border-collapse:collapse">
        <thead>
          ${showShelfGroup ? `<tr style="border-bottom:1px solid #f1f7f9;background:#f7fbfc">
            <th style="padding:8px 16px" colspan="2"></th>
            <th style="padding:8px 16px;text-align:center;font-size:12px;font-weight:600;color:#677b82" colspan="2">Shelf</th>
          </tr>` : ''}
          <tr style="border-bottom:1px solid #e3eaed;background:#f7fbfc">
            ${m.brkCols.map((col,i) => `<th class="sort-col" data-key="${colKeys[i]}" style="padding:10px 16px;font-size:12px;font-weight:600;color:#475e66;cursor:pointer;user-select:none">${col}${sortIcon}</th>`).join('')}
          </tr>
        </thead>
        <tbody>`;
      sorted.forEach(row => {
        const sc2 = scaleVal(row.c2);
        const sc3 = Math.round(row.c3 * mult * 10) / 10;
        const e2col = row.e2>0?'#12b76a':row.e2<0?'#f04438':'#677b82';
        const e2arr = row.e2>0?'&#9650;':row.e2<0?'&#9660;':'';
        const e3col = row.e3>0?'#12b76a':row.e3<0?'#f04438':'#677b82';
        const e3arr = row.e3>0?'&#9650;':row.e3<0?'&#9660;':'';
        tblHTML += `<tr style="border-bottom:1px solid #f1f7f9" onmouseover="this.style.background='#f7fbfc'" onmouseout="this.style.background='transparent'">
          <td style="padding:12px 16px;font-size:14px;font-weight:500;color:#3d5761">${row.l}</td>
          <td style="padding:12px 16px;text-align:center;font-size:14px;font-weight:600;color:#1c3036">${(row.r*100).toFixed(2)}%</td>
          <td style="padding:12px 16px;text-align:right">
            <div style="font-size:14px;font-weight:500;color:#1c3036">${fmtNum(sc2)}</div>
            <div style="font-size:11px;color:${e2col}">${e2arr} ${Math.abs(row.e2)}%</div>
          </td>
          <td style="padding:12px 16px;text-align:right">
            <div style="font-size:14px;font-weight:500;color:#1c3036">${fmtNum(sc3)}</div>
            <div style="font-size:11px;color:${e3col}">${e3arr} ${Math.abs(row.e3)}%</div>
          </td>
        </tr>`;
      });
      tblHTML += `</tbody></table>
        <div style="display:flex;align-items:center;justify-content:space-between;border-top:1px solid #e3eaed;padding:10px 16px">
          <span style="font-size:12px;color:#677b82">Number of rows: <strong>${sorted.length}</strong></span>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:12px;color:#677b82">Rows per page</span>
            <select style="border:1px solid #e3eaed;border-radius:6px;padding:4px 24px 4px 8px;font-size:12px;color:#3d5761;outline:none"><option>10</option><option>25</option></select>
            <button style="width:28px;height:28px;border-radius:6px;background:#1c3036;color:white;font-size:12px;font-weight:500;border:none;cursor:pointer">1</button>
          </div>
        </div>`;
      tblWrap.innerHTML = tblHTML;
      tblSection.appendChild(tblWrap);
      el.appendChild(tblSection);

      tblWrap.querySelectorAll('.sort-col').forEach(th => {
        th.addEventListener('click', () => {
          const k = th.dataset.key;
          if (sortKey === k) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
          else { sortKey = k; sortDir = 'desc'; }
          render();
        });
      });
    }

    // Period toggle
    document.getElementById('period-group').addEventListener('click', e => {
      const btn = e.target.closest('.period-btn');
      if (!btn) return;
      document.querySelectorAll('.period-btn').forEach(b => { b.style.background='transparent'; b.style.color='#677b82'; b.style.boxShadow='none'; });
      btn.style.background='white'; btn.style.color='#1c3036'; btn.style.boxShadow='0 1px 2px rgba(0,0,0,0.06)';
    });

    // Initial
    updateStoreDropdown();
    updateScopeBanner();
    render();
  </script>
</body>
</html>
