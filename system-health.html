        issue: issue,
        firmware: '4.2.1',
        model: 'VuCam Pro 48MP',

    const accuracy = visit.truePositives / visit.sampledProducts;
    return { precision, recall, f1, accuracy };

  // =========================================================================

  let currentView = 'company';

  // =========================================================================
  // HELPERS
  // =========================================================================
  function pct(actual, expected) { return expected === 0 ? 0 : (actual / expected * 100); }
  function fmtPct(v) { return v.toFixed(1) + '%'; }
  function fmtNum(v) { return v.toLocaleString('en'); }

  function healthColor(pctVal, type) {
    const t = {
      camerasOnline: { green: 95, amber: 90 },
      imagePipeline: { green: 97, amber: 94 },
      lowBattery: { green: 5, amber: 10 },
      imageQuality: { green: 3, amber: 7 },
    };
    const th = t[type];
    if (!th) return 'green';
    if (type === 'lowBattery' || type === 'imageQuality') {
      if (pctVal < th.green) return 'green';
      if (pctVal <= th.amber) return 'amber';
      return 'red';
    }
    if (pctVal > th.green) return 'green';
    if (pctVal >= th.amber) return 'amber';
    return 'red';
  }

  function statusDot(color) {
    return `<span class="health-dot status-${color}"></span>`;
  }

  function badgeHTML(color, text) {
    return `<span class="badge badge-${color}">${statusDot(color)} ${text}</span>`;
  }

  function priorityBadge(p) {
    const m = { Critical:'red', High:'red', Medium:'amber', Low:'green' };
    return `<span class="badge badge-${m[p]||'gray'}">${p}</span>`;
  }

  function statusBadge(s) {
    const m = { Open:'blue', 'In Progress':'amber', Resolved:'green' };
    return `<span class="badge badge-${m[s]||'gray'}">${s}</span>`;
  }

  function typeBadge(t) {
    return `<span class="badge ${t==='Remote'?'badge-blue':'badge-gray'}">${t}</span>`;
  }

  function kpiCard(label, actual, expected, thresholdType, icon) {
    const p = pct(actual, expected);
    const color = healthColor(p, thresholdType);
    const invertDisplay = (thresholdType === 'lowBattery' || thresholdType === 'imageQuality');
    const displayPct = invertDisplay ? pct(actual, expected) : p;
    return `
      <div class="kpi-card">
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs font-medium" style="color:#677b82">${label}</span>
          ${statusDot(color)}
        </div>
        <div class="flex items-baseline gap-2 mb-1">
          <span class="text-2xl font-bold" style="color:#1c3036">${fmtNum(actual)}</span>
          <span class="text-sm" style="color:#9aaab0">/ ${fmtNum(expected)}</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-lg font-semibold" style="color:${color==='green'?'#12b76a':color==='amber'?'#d97706':'#f04438'}">${fmtPct(displayPct)}</span>
          ${badgeHTML(color, color === 'green' ? 'Healthy' : color === 'amber' ? 'Warning' : 'Critical')}
        </div>
      </div>
    `;
  }

  // =========================================================================
  // AGGREGATE HELPERS
  // =========================================================================
  function aggregateStores(stores) {
    const agg = { cameras: 0, online: 0, battLow: 0, img48A: 0, img48E: 0, uptimeA: 0, uptimeE: 0, blinkA: 0, blinkE: 0, labelsA: 0, labelsE: 0, imgIssues: 0 };
    stores.forEach(s => {
      agg.cameras += s.cameras;
      agg.online += s.online;
      agg.battLow += s.battLow;
      agg.img48A += s.img48.actual;
      agg.img48E += s.img48.expected;
      agg.uptimeA += s.uptime.actual;
      agg.uptimeE += s.uptime.expected;
      agg.blinkA += s.blinkId.actual;
      agg.blinkE += s.blinkId.expected;
      agg.labelsA += s.labels.actual;
      agg.labelsE += s.labels.expected;
      agg.imgIssues += s.imgIssues;
    });
    return agg;
  }

  function getChainHealth(chain) {
    const a = aggregateStores(chain.stores);
    const onlinePct = pct(a.online, a.cameras);
    const battPct = pct(a.battLow, a.cameras);
    const imgPct = pct(a.img48A, a.img48E);
    const issuePct = pct(a.imgIssues, a.cameras);
    const colors = [
      healthColor(onlinePct, 'camerasOnline'),
      healthColor(battPct, 'lowBattery'),
      healthColor(imgPct, 'imagePipeline'),
      healthColor(issuePct, 'imageQuality'),
    ];
    if (colors.includes('red')) return 'red';
    if (colors.includes('amber')) return 'amber';
    return 'green';
  }

  function getStoreHealth(store) {
    const onlinePct = pct(store.online, store.cameras);
    const battPct = pct(store.battLow, store.cameras);
    const imgPct = pct(store.img48.actual, store.img48.expected);
    const issuePct = pct(store.imgIssues, store.cameras);
    const colors = [
      healthColor(onlinePct, 'camerasOnline'),
      healthColor(battPct, 'lowBattery'),
      healthColor(imgPct, 'imagePipeline'),
      healthColor(issuePct, 'imageQuality'),
    ];
    if (colors.includes('red')) return 'red';
    if (colors.includes('amber')) return 'amber';
    return 'green';
  }

                       (v === 'cvanalysis' && currentView === 'cvanalysis') ||
                       (v === 'company' && ['company','chain','store','camera'].includes(currentView));

      btn.className = `nav-btn rounded-lg px-3.5 py-1.5 text-sm ${isActive ? 'font-medium' : 'hover:bg-gray-50'} transition`;
    });
  }

  function updateBreadcrumb() {
    const bar = document.getElementById('breadcrumb-bar');
    const bc = document.getElementById('breadcrumb');
    if (currentView === 'company' || currentView === 'tasks' || currentView === 'cvanalysis') {
      bar.classList.add('hidden');
      return;
    }
    bar.classList.remove('hidden');
    let crumbs = [{ label: 'Estate', view: 'company' }];
    if (currentChain) {
      const chain = CHAINS.find(c => c.id === currentChain);
      crumbs.push({ label: chain?.name || currentChain, view: 'chain', chainId: currentChain });
    }
    if (currentStore) {
      const chain = CHAINS.find(c => c.id === currentChain);
      const store = chain?.stores.find(s => s.id === currentStore);
      crumbs.push({ label: store?.name || currentStore, view: 'store', chainId: currentChain, storeId: currentStore });
    }
    if (currentCamera) {
      crumbs.push({ label: currentCamera, view: 'camera', chainId: currentChain, storeId: currentStore, cameraId: currentCamera });
    }
    bc.innerHTML = crumbs.map((c, i) => {
      const isLast = i === crumbs.length - 1;
      const sep = i > 0 ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9aaab0" stroke-width="2" style="flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>' : '';
      if (isLast) return `${sep}<span class="font-medium" style="color:#1c3036">${c.label}</span>`;

      const accColor = acc.accuracy >= 0.9 ? '#12b76a' : acc.accuracy >= 0.8 ? '#d97706' : '#f04438';
      const totalErrs = Object.values(visit.errors).reduce((a, b) => a + b, 0);
      const topErrors = ERROR_CATEGORIES.map(ec => ({ ...ec, count: visit.errors[ec.id] || 0 })).sort((a, b) => b.count - a.count).slice(0, 4);
      const maxErr = topErrors[0]?.count || 1;

      html += `
        <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-4">
          <div class="rounded-lg p-3" style="background:#f7fbfc">
            <p class="text-xs" style="color:#9aaab0">Accuracy</p>

            <p class="text-xs" style="color:#9aaab0">Precision</p>
            <p class="text-lg font-bold" style="color:#1c3036">${(acc.precision * 100).toFixed(1)}%</p>
          </div>
          <div class="rounded-lg p-3" style="background:#f7fbfc">
            <p class="text-xs" style="color:#9aaab0">Recall</p>
            <p class="text-lg font-bold" style="color:#1c3036">${(acc.recall * 100).toFixed(1)}%</p>
          </div>
          <div class="rounded-lg p-3" style="background:#f7fbfc">
            <p class="text-xs" style="color:#9aaab0">F1</p>
            <p class="text-lg font-bold" style="color:#1c3036">${(acc.f1 * 100).toFixed(1)}%</p>
          </div>
          <div class="rounded-lg p-3" style="background:#f7fbfc">
            <p class="text-xs" style="color:#9aaab0">Sampled</p>
            <p class="text-lg font-bold" style="color:#1c3036">${visit.sampledProducts}</p>
          </div>
        </div>
        <div class="flex items-center gap-3 mb-3">
          <span class="text-xs" style="color:#9aaab0">Last visit: <strong style="color:#3d5761">${visit.date}</strong> by ${visit.auditor}</span>
        </div>
        <p class="text-xs font-medium mb-2" style="color:#677b82">Top Error Root Causes</p>
        <div class="flex flex-col gap-1.5">
          ${topErrors.filter(e => e.count > 0).map(err => `
            <div style="display:flex;align-items:center;gap:8px">
              <div style="min-width:180px;font-size:11px;color:#3d5761;text-align:right">${err.label}</div>
              <div style="flex:1;height:14px;background:#f1f7f9;border-radius:3px;overflow:hidden">
                <div style="height:100%;width:${(err.count / maxErr) * 100}%;background:${err.color};border-radius:3px"></div>
              </div>
              <div style="min-width:30px;font-size:11px;font-weight:500;color:#1c3036">${err.count}</div>
            </div>
          `).join('')}
        </div>`;
    } else {
      html += '<p class="text-sm" style="color:#9aaab0">No visit data available yet.</p>';
    }

    if (next) {
      const days = daysUntil(next.date);
      const urgency = days <= 7 ? 'red' : days <= 14 ? 'amber' : 'blue';
      html += `
        <div class="mt-4 rounded-lg p-3 flex items-center justify-between" style="background:#eff6ff;border:1px solid #dbeafe">
          <div class="flex items-center gap-3">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>

          </div>
          <span class="badge badge-${urgency}">${days >= 0 ? (days === 0 ? 'Today' : `In ${days} days`) : 'Overdue'}</span>
        </div>`;
    }

    html += '</div>';
    return html;
  }

  // =========================================================================
  // CV ANALYSIS VIEW
  // =========================================================================
  function renderCVAnalysisView(el) {
    const allStores = CHAINS.flatMap(c => c.stores);
    let totalSampled = 0, totalTP = 0, totalFP = 0, totalFN = 0;
    const allErrors = {};
    ERROR_CATEGORIES.forEach(ec => allErrors[ec.id] = 0);
    const storeRows = [];

    allStores.forEach(store => {
      const visit = getLatestVisit(store.id);
      if (!visit) return;
      totalSampled += visit.sampledProducts;
      totalTP += visit.truePositives;
      totalFP += visit.falsePositives;
      totalFN += visit.falseNegatives;
      Object.entries(visit.errors).forEach(([k, v]) => { allErrors[k] = (allErrors[k] || 0) + v; });
      const acc = getVisitAccuracy(visit);
      const chain = CHAINS.find(c => c.stores.some(s => s.id === store.id));
      const next = NEXT_VISITS[store.id];
      const daysLeft = next ? daysUntil(next.date) : null;
      storeRows.push({ store, chain, visit, acc, next, daysLeft });
    });

    const globalPrecision = totalTP / (totalTP + totalFP);
    const globalRecall = totalTP / (totalTP + totalFN);
    const globalF1 = 2 * (globalPrecision * globalRecall) / (globalPrecision + globalRecall);
    const globalAccuracy = totalTP / totalSampled;

    const totalErrors = Object.values(allErrors).reduce((a, b) => a + b, 0);
    const sortedErrors = ERROR_CATEGORIES.map(ec => ({ ...ec, count: allErrors[ec.id], pct: totalErrors > 0 ? (allErrors[ec.id] / totalErrors * 100) : 0 })).sort((a, b) => b.count - a.count);

    const upcomingVisits = storeRows.filter(r => r.daysLeft !== null && r.daysLeft >= 0).sort((a, b) => a.daysLeft - b.daysLeft);

    el.innerHTML = `
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-xl font-semibold" style="color:#1c3036">CV Model Performance Analysis</h1>
          <p class="text-sm mt-0.5" style="color:#677b82">Accuracy assessed via in-store visits &middot; Reality vs. Model comparison</p>
        </div>
        <div class="flex items-center gap-2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#677b82" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span class="text-xs font-medium" style="color:#677b82">Based on ${storeRows.length} store visits &middot; ${fmtNum(totalSampled)} products sampled</span>
        </div>
      </div>

      <!-- GLOBAL ACCURACY KPIs -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="kpi-card">
          <span class="text-xs font-medium" style="color:#677b82">Overall Accuracy</span>
          <p class="text-2xl font-bold mt-2" style="color:${globalAccuracy >= 0.9 ? '#12b76a' : globalAccuracy >= 0.8 ? '#d97706' : '#f04438'}">${(globalAccuracy * 100).toFixed(1)}%</p>
          <p class="text-xs mt-1" style="color:#9aaab0">${fmtNum(totalTP)} correct / ${fmtNum(totalSampled)} sampled</p>
        </div>
        <div class="kpi-card">
          <span class="text-xs font-medium" style="color:#677b82">Precision</span>
          <p class="text-2xl font-bold mt-2" style="color:${globalPrecision >= 0.95 ? '#12b76a' : globalPrecision >= 0.9 ? '#d97706' : '#f04438'}">${(globalPrecision * 100).toFixed(1)}%</p>
          <p class="text-xs mt-1" style="color:#9aaab0">TP / (TP + FP) &middot; ${fmtNum(totalFP)} false positives</p>
        </div>
        <div class="kpi-card">
          <span class="text-xs font-medium" style="color:#677b82">Recall</span>
          <p class="text-2xl font-bold mt-2" style="color:${globalRecall >= 0.92 ? '#12b76a' : globalRecall >= 0.85 ? '#d97706' : '#f04438'}">${(globalRecall * 100).toFixed(1)}%</p>
          <p class="text-xs mt-1" style="color:#9aaab0">TP / (TP + FN) &middot; ${fmtNum(totalFN)} missed</p>
        </div>
        <div class="kpi-card">
          <span class="text-xs font-medium" style="color:#677b82">F1 Score</span>
          <p class="text-2xl font-bold mt-2" style="color:${globalF1 >= 0.93 ? '#12b76a' : globalF1 >= 0.87 ? '#d97706' : '#f04438'}">${(globalF1 * 100).toFixed(1)}%</p>
          <p class="text-xs mt-1" style="color:#9aaab0">Harmonic mean of precision & recall</p>
        </div>
      </div>

      <!-- ROOT CAUSE ANALYSIS -->
      <div class="rounded-xl border bg-white p-5" style="border-color:#e3eaed">
        <h2 class="text-sm font-semibold mb-4" style="color:#475e66">Root Cause Analysis – Error Distribution (all visits)</h2>
        <div class="flex flex-col gap-3" id="error-bars"></div>
      </div>

      <!-- UPCOMING VISITS -->
      <div>
        <h2 class="text-base font-semibold mb-3" style="color:#1c3036">Upcoming Store Visits</h2>
        <div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide" id="upcoming-visits"></div>
      </div>

      <!-- PER-STORE ACCURACY TABLE -->
      <div>
        <h2 class="text-base font-semibold mb-3" style="color:#1c3036">Accuracy by Store (Latest Visit)</h2>
        <div class="overflow-hidden rounded-xl border bg-white" style="border-color:#e3eaed" id="cv-store-table"></div>
      </div>
    `;

    const errorBars = document.getElementById('error-bars');
    const maxCount = sortedErrors[0]?.count || 1;
    sortedErrors.forEach(err => {
      if (err.count === 0) return;
      const barDiv = document.createElement('div');
      barDiv.className = 'flex items-center gap-3';

        <div style="flex:1;height:24px;background:#f1f7f9;border-radius:6px;overflow:hidden;position:relative">
          <div style="height:100%;width:${(err.count / maxCount) * 100}%;background:${err.color};border-radius:6px;transition:width 0.4s"></div>
        </div>
        <div style="min-width:80px;font-size:12px;font-weight:500;color:#1c3036">${err.count} <span style="color:#9aaab0">(${err.pct.toFixed(1)}%)</span></div>
      `;
      errorBars.appendChild(barDiv);
    });

    const visitsContainer = document.getElementById('upcoming-visits');
    upcomingVisits.slice(0, 8).forEach(r => {
      const urgency = r.daysLeft <= 7 ? 'red' : r.daysLeft <= 14 ? 'amber' : 'green';
      const card = document.createElement('div');
      card.className = 'kpi-card cursor-pointer';
      card.style.minWidth = '200px';
      card.onclick = () => { const chain = CHAINS.find(c => c.stores.some(s => s.id === r.store.id)); navigate('store', chain.id, r.store.id); };
      card.innerHTML = `
        <div class="flex items-center gap-2 mb-2">
          ${statusDot(urgency)}
          <span class="text-xs font-medium" style="color:#677b82">${r.daysLeft === 0 ? 'Today' : r.daysLeft === 1 ? 'Tomorrow' : `In ${r.daysLeft} days`}</span>
        </div>
        <p class="text-sm font-medium" style="color:#1c3036">${r.store.name}</p>
        <p class="text-xs mt-1" style="color:#9aaab0">${r.next.date}</p>
        <p class="text-xs" style="color:#677b82">${r.next.auditor}</p>
      `;
      visitsContainer.appendChild(card);
    });

    const tbl = document.getElementById('cv-store-table');
    let html = `<table style="width:100%;text-align:left;border-collapse:collapse">
      <thead><tr style="border-bottom:1px solid #e3eaed;background:#f7fbfc">
        <th style="padding:12px 16px;font-size:12px;font-weight:600;color:#475e66">Store</th>
        <th style="padding:12px 16px;font-size:12px;font-weight:600;color:#475e66">Chain</th>
        <th style="padding:12px 16px;font-size:12px;font-weight:600;color:#475e66;text-align:center">Last Visit</th>
        <th style="padding:12px 16px;font-size:12px;font-weight:600;color:#475e66;text-align:center">Sampled</th>
        <th style="padding:12px 16px;font-size:12px;font-weight:600;color:#475e66;text-align:center">Accuracy</th>
        <th style="padding:12px 16px;font-size:12px;font-weight:600;color:#475e66;text-align:center">Precision</th>
        <th style="padding:12px 16px;font-size:12px;font-weight:600;color:#475e66;text-align:center">Recall</th>
        <th style="padding:12px 16px;font-size:12px;font-weight:600;color:#475e66;text-align:center">F1</th>
        <th style="padding:12px 16px;font-size:12px;font-weight:600;color:#475e66;text-align:center">Next Visit</th>
        <th style="padding:12px 16px"></th>
      </tr></thead><tbody>`;

    storeRows.sort((a, b) => a.acc.accuracy - b.acc.accuracy).forEach(r => {
      const accColor = r.acc.accuracy >= 0.9 ? '#12b76a' : r.acc.accuracy >= 0.8 ? '#d97706' : '#f04438';
      const nextLabel = r.next ? r.next.date : '—';
      const dLabel = r.daysLeft !== null && r.daysLeft >= 0 ? `<span style="font-size:10px;color:#9aaab0">(${r.daysLeft}d)</span>` : '';
      html += `<tr class="row-link" style="border-bottom:1px solid #f1f7f9" onclick="showVisitDetail('${r.store.id}','${r.visit.id}')">
        <td style="padding:12px 16px;font-size:13px;font-weight:500;color:#1c3036">${r.store.name}</td>
        <td style="padding:12px 16px;font-size:12px;color:#677b82">${r.chain.name}</td>
        <td style="padding:12px 16px;text-align:center;font-size:12px;color:#3d5761">${r.visit.date}</td>
        <td style="padding:12px 16px;text-align:center;font-size:13px;color:#3d5761">${r.visit.sampledProducts}</td>
        <td style="padding:12px 16px;text-align:center;font-size:13px;font-weight:600;color:${accColor}">${(r.acc.accuracy * 100).toFixed(1)}%</td>
        <td style="padding:12px 16px;text-align:center;font-size:13px;color:#3d5761">${(r.acc.precision * 100).toFixed(1)}%</td>

  function showVisitDetail(storeId, visitId) {
    const visits = STORE_VISITS[storeId] || [];
    const visit = visits.find(v => v.id === visitId) || visits[0];
    if (!visit) return;
    const store = CHAINS.flatMap(c => c.stores).find(s => s.id === storeId);
    const chain = CHAINS.find(c => c.stores.some(s => s.id === storeId));
    const acc = getVisitAccuracy(visit);
    const next = NEXT_VISITS[storeId];
    const allVisits = visits;

    const totalErrs = Object.values(visit.errors).reduce((a, b) => a + b, 0);
    const maxErr = Math.max(...Object.values(visit.errors));
    const errorBarsHTML = ERROR_CATEGORIES
      .map(ec => ({ ...ec, count: visit.errors[ec.id] || 0 }))
      .sort((a, b) => b.count - a.count)

          <div style="min-width:55px;font-size:11px;font-weight:500;color:#1c3036">${err.count} <span style="color:#9aaab0">(${totalErrs > 0 ? (err.count / totalErrs * 100).toFixed(0) : 0}%)</span></div>

      `).join('');

    const confusionHTML = `

        <div style="padding:10px;text-align:center;font-weight:700;color:#f04438;border-right:1px solid #f1f7f9">FP: ${visit.falsePositives}</div>
        <div style="padding:10px;text-align:center;font-weight:700;color:#12b76a">TN: —</div>
      </div>
    `;

    const visitHistoryHTML = allVisits.length > 1 ? `
      <div style="margin-top:16px">
        <p class="text-xs font-medium mb-2" style="color:#677b82">Visit History</p>
        ${allVisits.map(v => {
          const a = getVisitAccuracy(v);
          const isCurrent = v.id === visit.id;
          return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #f1f7f9;${isCurrent ? 'background:#f7fbfc;margin:0 -8px;padding-left:8px;padding-right:8px;border-radius:6px' : ''}" class="${!isCurrent ? 'row-link' : ''}" ${!isCurrent ? `onclick="closeModal();showVisitDetail('${storeId}','${v.id}')"` : ''}>
            <span style="font-size:12px;color:#3d5761;min-width:90px">${v.date}</span>
            <span style="font-size:12px;color:#677b82">${v.auditor}</span>
            <span style="font-size:12px;font-weight:600;color:${a.accuracy >= 0.9 ? '#12b76a' : '#d97706'};margin-left:auto">${(a.accuracy * 100).toFixed(1)}% acc</span>
            ${isCurrent ? '<span class="badge badge-blue">Current</span>' : ''}
          </div>`;
        }).join('')}
      </div>
    ` : '';

    document.getElementById('modal-root').innerHTML = `
      <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal-panel fade-in" style="max-width:780px">
          <div class="flex items-center justify-between mb-5">
            <div>
              <div class="flex items-center gap-2 mb-1">
                <span class="badge badge-blue">${visit.id}</span>
                <span class="text-xs" style="color:#9aaab0">${visit.date}</span>
              </div>
              <h2 class="text-lg font-semibold" style="color:#1c3036">${store?.name || storeId}</h2>
              <p class="text-xs" style="color:#677b82">${chain?.name || ''} &middot; Auditor: ${visit.auditor} &middot; ${visit.sampledProducts} products sampled</p>
            </div>
            <button onclick="closeModal()" class="rounded-lg p-2 hover:bg-gray-100">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#677b82" stroke-width="2"><path stroke-linecap="round" d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>

          <!-- ACCURACY METRICS -->
          <div class="grid grid-cols-4 gap-3 mb-5">
            <div class="rounded-xl p-3" style="background:#f7fbfc">
              <p class="text-xs" style="color:#677b82">Accuracy</p>
              <p class="text-xl font-bold" style="color:${acc.accuracy >= 0.9 ? '#12b76a' : '#d97706'}">${(acc.accuracy * 100).toFixed(1)}%</p>
            </div>
            <div class="rounded-xl p-3" style="background:#f7fbfc">
              <p class="text-xs" style="color:#677b82">Precision</p>
              <p class="text-xl font-bold" style="color:#1c3036">${(acc.precision * 100).toFixed(1)}%</p>
            </div>
            <div class="rounded-xl p-3" style="background:#f7fbfc">
              <p class="text-xs" style="color:#677b82">Recall</p>
              <p class="text-xl font-bold" style="color:#1c3036">${(acc.recall * 100).toFixed(1)}%</p>
            </div>
            <div class="rounded-xl p-3" style="background:#f7fbfc">
              <p class="text-xs" style="color:#677b82">F1 Score</p>
              <p class="text-xl font-bold" style="color:#1c3036">${(acc.f1 * 100).toFixed(1)}%</p>
            </div>
          </div>

          <!-- CONFUSION MATRIX -->
          <div class="mb-5">
            <p class="text-xs font-medium mb-3" style="color:#677b82">Confusion Matrix</p>
            ${confusionHTML}
          </div>

          <!-- ROOT CAUSE -->
          <div class="mb-5">
            <p class="text-xs font-medium mb-3" style="color:#677b82">Root Cause Analysis – Error Breakdown</p>
            ${errorBarsHTML}
          </div>

          <!-- NOTES -->
          <div class="rounded-lg p-3 mb-4" style="background:#fffbeb;border:1px solid #fef3c7">
            <p class="text-xs font-medium mb-1" style="color:#d97706">Auditor Notes</p>
            <p class="text-sm" style="color:#3d5761">${visit.notes}</p>
          </div>

          <!-- NEXT VISIT -->
          ${next ? `
          <div class="rounded-lg p-3 mb-4" style="background:#eff6ff;border:1px solid #dbeafe">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-xs font-medium mb-1" style="color:#2563eb">Next Planned Visit</p>
                <p class="text-sm font-medium" style="color:#1c3036">${next.date} &middot; ${next.auditor}</p>
              </div>
              <span class="badge badge-blue">${daysUntil(next.date) >= 0 ? `In ${daysUntil(next.date)} days` : 'Overdue'}</span>
            </div>
          </div>` : ''}

          ${visitHistoryHTML}

          <div class="flex gap-3 mt-4">
            <button class="flex-1 rounded-lg py-2.5 text-sm font-medium text-white" style="background:#1c3036" onclick="closeModal()">Close</button>
          </div>
        </div>
      </div>
    `;
  }

  // =========================================================================
  // INIT
  // =========================================================================
  navigate('company');
  </script>
</body>
</html>
